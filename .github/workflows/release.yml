name: Build & Release

"on":
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PRODUCT_NAME: Reharm Studio

jobs:
  test:
    name: Unit Tests (macOS)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache JUCE (FetchContent)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.14-${{ runner.os }}-fetchcontent
          restore-keys: |
            juce-8.0.14-${{ runner.os }}-

      - name: Configure and Build (debug-tests)
        run: |
          cmake --preset debug-tests
          cmake --build --preset debug-tests --target ReharmStudioTests

      - name: Run unit tests
        run: |
          "build/ReharmStudioTests_artefacts/Debug/ReharmStudioTests"

  build:
    name: Build & Package (macOS)
    needs: test
    runs-on: macos-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      zip_name: ${{ steps.package.outputs.zip_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache JUCE (FetchContent)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-8.0.14-${{ runner.os }}-fetchcontent
          restore-keys: |
            juce-8.0.14-${{ runner.os }}-

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-$(git rev-parse --short HEAD)"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "::error::Resolved version is empty (ref: ${GITHUB_REF})"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Check version consistency (tag vs CMakeLists.txt)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CMAKE_VERSION="$(sed -nE 's/^project\(ReharmStudio VERSION ([0-9.]+)\)/\1/p' CMakeLists.txt)"
          if [[ "$TAG_VERSION" != "$CMAKE_VERSION" ]]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match CMakeLists.txt VERSION (${CMAKE_VERSION})"
            exit 1
          fi
          echo "Version consistency OK: ${TAG_VERSION}"

      - name: Install dependencies
        run: |
          if ! command -v cmake &> /dev/null; then
            brew install cmake
          fi

      - name: Configure and Build
        run: |
          cmake --preset release
          cmake --build --preset release

      - name: Ad-hoc Signing
        run: |
          codesign --force --deep --sign - "build/ReharmStudio_artefacts/Release/${PRODUCT_NAME}.app"

      - name: Clear Extended Attributes
        run: |
          xattr -cr "build/ReharmStudio_artefacts/Release/${PRODUCT_NAME}.app"

      - name: Package (zip)
        id: package
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="ReharmStudio-${VERSION}-macOS.zip"
          ditto -ck --keepParent "build/ReharmStudio_artefacts/Release/${PRODUCT_NAME}.app" "$ZIP_NAME"
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${ZIP_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ needs.build.outputs.zip_name }}
          path: dist

      - name: Verify zip present
        id: locate
        env:
          ZIP_NAME: ${{ needs.build.outputs.zip_name }}
        run: |
          set -euo pipefail
          ZIP_PATH="dist/${ZIP_NAME}"
          if [[ ! -f "$ZIP_PATH" ]]; then
            ZIP_PATH="$(find dist -name "${ZIP_NAME}" -maxdepth 2 | head -n1)"
          fi
          if [[ -z "$ZIP_PATH" || ! -f "$ZIP_PATH" ]]; then
            echo "::error::Packaged zip ${ZIP_NAME} not found in downloaded artifacts"
            exit 1
          fi
          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.locate.outputs.zip_path }}
          name: Release v${{ needs.build.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
