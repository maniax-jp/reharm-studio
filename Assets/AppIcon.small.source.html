<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
</style>
</head>
<body>
<!-- Small-size variant: 64-unit pixel grid, no glow / no staff lines,
     flat high-contrast fills so edges stay crisp at 64/32/16 px. -->
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262e3e"/>
      <stop offset="1" stop-color="#0e1014"/>
    </linearGradient>
  </defs>

  <rect x="3" y="3" width="58" height="58" rx="14" fill="url(#bg)"/>

  <rect x="13" y="16" width="28" height="9" rx="4.5" fill="#8b7bff"/>
  <rect x="23" y="27.5" width="28" height="9" rx="4.5" fill="#41e0b8"/>
  <rect x="13" y="39" width="28" height="9" rx="4.5" fill="#8b7bff"/>

  <circle cx="48" cy="20.5" r="4.5" fill="#ffb454"/>
</svg>
</body>
</html>
